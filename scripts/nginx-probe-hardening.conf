# Nginx probe hardening for Eagle Ford staging/production
#
# Apply on the VPS reverse proxy in front of port 4411 (not inside the Docker container).
# BT Panel / aaPanel: Site → Config → paste relevant blocks into the server {} block.
#
# Replace YOUR_DOMAIN with the real hostname (e.g. ford-staging.example.com).

# --- http {} block (once per nginx.conf) ---
# limit_req_zone $binary_remote_addr zone=post_burst:10m rate=30r/m;

# --- server {} block ---

# Reject direct-IP access — scanners often hit http://<server-ip>/ bypassing domain rules
if ($host ~* "^[0-9.]+$") {
    return 444;
}

# Reject obvious Server Action probes (valid IDs are long encrypted hex strings)
if ($http_next_action ~ "^[a-zA-Z]{1,8}$") {
    return 403;
}

# Optional: rate-limit burst POST scanners (uncomment limit_req_zone above first)
# location / {
#     limit_req zone=post_burst burst=10 nodelay;
#     proxy_pass http://127.0.0.1:4411;
#     ...
# }

# Ensure RSC responses are not cached by the proxy
# proxy_cache off;
# proxy_no_cache 1;
# proxy_cache_bypass 1;
